name: Build-Push-Deploy #name of the workflow
on: 
  push:
    branch: [ "master" ]

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest #github-hosted-runner from github

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: "temurin"
        java-version: "17"
    - name: Build with Maven
      run: mvn -B package
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{secrets.DOCKER_HUB_USERNAME}}
        password: ${{secrets.DOCKER_HUB_TOKEN}}
    - name: Build Docker Image
      run: docker build -t ${{secrets.DOCKER_HUB_USERNAME}}/java-docker-app:latest .
    - name: Push Docker Image to DockerHub
      run: docker push ${{secrets.DOCKER_HUB_USERNAME}}/java-docker-app:latest
    - name: Deploy Container to EC2 (via SSH)
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{secrets.EC2_HOST}}
        username: ${{secrets.EC2_INSTANCE}}
        key: ${{secrets.EC2_SSH}}
        script: |
          # stop and remove existing containers
          docker rm -f javaapp || true
          #Pull latest image
          docker pull ${{secrets.DOCKER_HUB_USERNAME}}/java-docker-app:latest
          #Run the Container
          docker run -d -p 8080:8080 --name javaapp ${{secrets.DOCKER_HUB_USERNAME}}/java-docker-app:latest
          #Show running containers
          docker ps
